<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente IA · JM Prestige AI Solutions</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C9A227">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JM Prestige IA">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --gold: #C9A227;
      --dark: #0D0D0D;
      --dark2: #1A1A2E;
      --dark3: #16213E;
      --text: #F0F0F0;
      --text2: #AAA;
      --border: rgba(201,162,39,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, var(--dark2), var(--dark3));
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-circle {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #8B6914);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .header-info h1 { font-size: 16px; font-weight: 700; color: var(--gold); }
    .header-info p { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .header-badge {
      margin-left: auto;
      background: rgba(201,162,39,0.15);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10px;
      color: var(--gold);
      font-weight: 600;
    }
    .lang-bar {
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .lang-btn {
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--gold);
      color: var(--dark);
      font-weight: 700;
      border-color: var(--gold);
    }
    .lang-separator { color: var(--text2); font-size: 12px; margin: 0 4px; }
    #chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .msg.ia .msg-avatar { background: linear-gradient(135deg, var(--gold), #8B6914); }
    .msg.user .msg-avatar { background: var(--dark3); border: 1px solid var(--border); }
    .msg-bubble {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
    }
    .msg.ia .msg-bubble {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, var(--gold), #8B6914);
      color: var(--dark);
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }
    .chips-wrap {
      padding: 0 20px 12px;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }
    .chips-titulo {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--gold);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover, .chip:active { background: rgba(201,162,39,0.15); }
    .input-wrap {
      padding: 14px 20px;
      background: var(--dark2);
      border-top: 1px solid var(--border);
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap textarea {
      flex: 1;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      padding: 10px 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.5;
    }
    .input-wrap textarea:focus { outline: none; border-color: var(--gold); }
    .input-wrap textarea::placeholder { color: var(--text2); }
    .btn-send {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--gold), #8B6914);
      border: none; border-radius: 50%;
      color: var(--dark);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .coste-bar {
      padding: 6px 20px;
      background: var(--dark);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      font-size: 10px;
      color: var(--text2);
    }
    .coste-bar span { color: var(--gold); font-weight: 600; }
    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      margin: 0 2px;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    #chat-msgs::-webkit-scrollbar { width: 4px; }
    #chat-msgs::-webkit-scrollbar-track { background: transparent; }
    #chat-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo-circle">✦</div>
  <div class="header-info">
    <h1>JM Prestige AI Solutions</h1>
    <p>Asistente IA · Juan Manuel Herreruela</p>
  </div>
  <div class="header-badge">● Online</div>
</header>

<div class="lang-bar">
  <button class="lang-btn active" id="btn-es" onclick="setLang('es')">🇪🇸 Español</button>
  <span class="lang-separator">|</span>
  <button class="lang-btn" id="btn-ca" onclick="setLang('ca')">🏴 Català</button>
</div>

<div id="chat-msgs"></div>

<div class="chips-wrap">
  <div class="chips-titulo" id="chips-titulo">PREGUNTAS FRECUENTES</div>
  <div class="chips" id="chips"></div>
</div>

<div class="input-wrap">
  <textarea id="user-input" placeholder="Escribe tu consulta..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar();}"></textarea>
  <button class="btn-send" id="btn-send" onclick="enviar()">➤</button>
</div>

<div class="coste-bar">
  <div>Consultas: <span id="n-consultas">0</span></div>
  <div>Coste sesión: <span id="coste-sesion">0,000 €</span></div>
</div>

<script>
const WORKER = 'https://orange-boat-6d42.pedrosaborrego.workers.dev/';
let lang = 'es';
let historial = [];
let nConsultas = 0;
let costeSesion = 0;

const TEXTOS = {
  es: {
    bienvenida: `¡Hola! 👋 Soy el asistente de **JM Prestige AI Solutions**.\n\nPuedo informarte sobre nuestras apps, servicios y precios. ¿En qué puedo ayudarte?`,
    chips_titulo: 'PREGUNTAS FRECUENTES',
    chips: [
      '¿Qué servicios ofrecéis?',
      '¿Cuánto cuesta una app?',
      '¿Cómo funciona el proceso?',
      'Quiero una app para mi empresa',
      'Apps con Inteligencia Artificial',
      '¿Tenéis ejemplos reales?'
    ],
    placeholder: 'Escribe tu consulta...',
    system: `Eres el asistente virtual de JM Prestige AI Solutions, empresa de desarrollo de apps PWA e Inteligencia Artificial con sede en Lleida (Cataluña). Fundada y dirigida por Juan Manuel Herreruela.

SERVICIOS PRINCIPALES:
- Apps PWA (Progressive Web Apps) para empresas: funcionan en móvil, tablet y PC sin instalar nada. Se despliegan en GitHub Pages con backend en Firebase.
- Apps con IA integrada: chatbots, asesores virtuales, análisis automático con Claude (Anthropic).
- Paneles de gestión en tiempo real: para empresas de construcción, seguridad, reparto, política, etc.
- Agentes WhatsApp con IA: atienden clientes 24h automáticamente.
- Soluciones para sectores: construcción, pintura, seguridad, transporte, alimentación, política.

PROYECTOS REALIZADOS (ejemplos reales):
- ObraControl GPS Lance: control de presencia y obras para Construcciones Lance 2024 SL (Marchena, Sevilla). GPS, fichaje, 6 idiomas, 54 trabajadores.
- BarrosoApp: albaranes digitales para Excavaciones Barroso (Almacelles, Lleida). Conductores con tablet, firma digital, PDF automático.
- Marcius Seguridad: app de guardias de seguridad con GPS, checkpoints, informe de turno PDF.
- AquíProu: app anti-acoso escolar para instituto de Lleida. Trilingüe, IA, anónima.
- Panel Político Gáldar: sistema digital completo para concejal de Gran Canaria. Quejas vecinales, IA política, Telegram, inteligencia electoral.
- PinturApp: app de presupuestos para pintores con patrocinio de tienda de pinturas.

MODELO DE PRECIOS:
- Apps estandarizadas: GRATIS (sin coste de desarrollo, sin compromiso)
- Solo pagas el mantenimiento mensual:
  · Plan Básico: 20€/mes — actualizaciones y hasta 2 cambios pequeños al mes
  · Plan Estándar: 50€/mes — soporte WhatsApp, hasta 4 cambios, respuesta en 24h
  · Plan Premium: 150€/mes — desarrollo incluido, soporte prioritario y formación del equipo
- Apps a medida o con funcionalidades especiales: presupuesto personalizado
- Agente WhatsApp IA: desde 150€/mes
- Sin permanencia, cancela cuando quieras, sin costes ocultos

TECNOLOGÍA:
- Frontend: HTML, CSS, JavaScript (PWA)
- Backend: Firebase (Firestore, Realtime Database)
- IA: Claude (Anthropic) via Cloudflare Workers
- Despliegue: GitHub Pages (gratis, rápido, seguro)
- Sin servidores propios — coste mínimo para el cliente

CONTACTO:
- WhatsApp/Teléfono: disponible bajo petición
- Email: info@obracontrolgps.net
- Web: obracontrol-tech.github.io/jmprestige
- Ubicación: Lleida, Cataluña — trabaja con clientes de toda España

ESTILO DE RESPUESTA:
- Responde siempre en español claro y profesional
- Sé cercano, no demasiado formal
- Si el cliente muestra interés en contratar, invítale a contactar directamente con Juan Manuel
- Máximo 4-5 líneas por respuesta salvo que se pida más detalle
- Usa emojis con moderación`
  },
  ca: {
    bienvenida: `Hola! 👋 Sóc l'assistent de **JM Prestige AI Solutions**.\n\nPuc informar-te sobre les nostres apps, serveis i preus. En què et puc ajudar?`,
    chips_titulo: 'PREGUNTES FREQÜENTS',
    chips: [
      'Quins serveis oferiu?',
      'Quant costa una app?',
      'Com funciona el procés?',
      'Vull una app per a la meva empresa',
      'Apps amb Intel·ligència Artificial',
      'Teniu exemples reals?'
    ],
    placeholder: 'Escriu la teva consulta...',
    system: `Ets l'assistent virtual de JM Prestige AI Solutions, empresa de desenvolupament d'apps PWA i Intel·ligència Artificial amb seu a Lleida (Catalunya). Fundada i dirigida per Juan Manuel Herreruela.

SERVEIS PRINCIPALS:
- Apps PWA (Progressive Web Apps) per a empreses: funcionen a mòbil, tauleta i PC sense instal·lar res. Es despleguen a GitHub Pages amb backend a Firebase.
- Apps amb IA integrada: chatbots, assessors virtuals, anàlisi automàtica amb Claude (Anthropic).
- Panells de gestió en temps real: per a empreses de construcció, seguretat, repartiment, política, etc.
- Agents WhatsApp amb IA: atenen clients 24h automàticament.
- Solucions per a sectors: construcció, pintura, seguretat, transport, alimentació, política.

PROJECTES REALITZATS (exemples reals):
- ObraControl GPS Lance: control de presència i obres per a Construcciones Lance 2024 SL. GPS, fitxatge, 6 idiomes, 54 treballadors.
- BarrosoApp: albarans digitals per a Excavaciones Barroso (Almacelles, Lleida). Conductors amb tauleta, signatura digital, PDF automàtic.
- Marcius Seguretat: app de guàrdies de seguretat amb GPS, checkpoints, informe de torn PDF.
- AquíProu: app anti-assetjament escolar per a un institut de Lleida. Trilingüe, IA, anònima.
- Panel Polític Gáldar: sistema digital complet per a regidor de Gran Canaria.
- PinturApp: app de pressupostos per a pintors amb patrocini de botiga de pintures.

MODEL DE PREUS:
- Apps estandarditzades: GRATUÏTES (sense cost de desenvolupament, sense compromís)
- Només pagues el manteniment mensual:
  · Pla Bàsic: 20€/mes — actualitzacions i fins a 2 canvis petits al mes
  · Pla Estàndard: 50€/mes — suport WhatsApp, fins a 4 canvis, resposta en 24h
  · Pla Premium: 150€/mes — desenvolupament inclòs, suport prioritari i formació de l'equip
- Apps a mida o amb funcionalitats especials: pressupost personalitzat
- Agent WhatsApp IA: des de 150€/mes
- Sense permanència, cancel·la quan vulguis, sense costos ocults

TECNOLOGIA:
- Frontend: HTML, CSS, JavaScript (PWA)
- Backend: Firebase (Firestore, Realtime Database)
- IA: Claude (Anthropic) via Cloudflare Workers
- Desplegament: GitHub Pages (gratuït, ràpid, segur)

CONTACTE:
- Email: info@obracontrolgps.net
- Web: obracontrol-tech.github.io/jmprestige
- Ubicació: Lleida, Catalunya — treballa amb clients de tota Espanya

ESTIL DE RESPOSTA:
- Respon sempre en català clar i professional
- Sigues proper, no massa formal
- Si el client mostra interès en contractar, convida'l a contactar directament amb Juan Manuel
- Màxim 4-5 línies per resposta llevat que es demani més detall
- Usa emojis amb moderació`
  }
};

function setLang(l) {
  lang = l;
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('btn-ca').classList.toggle('active', l === 'ca');
  document.getElementById('user-input').placeholder = TEXTOS[l].placeholder;
  document.getElementById('chips-titulo').textContent = TEXTOS[l].chips_titulo;
  renderChips();
}

function renderChips() {
  const chips = document.getElementById('chips');
  chips.innerHTML = TEXTOS[lang].chips.map(c =>
    `<button class="chip" onclick="preguntaRapida('${c}')">${c}</button>`
  ).join('');
}

function addMsg(tipo, texto) {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = `msg ${tipo}`;
  const html = texto.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('\n').join('<br>');
  div.innerHTML = `
    <div class="msg-avatar">${tipo === 'ia' ? '✦' : '👤'}</div>
    <div class="msg-bubble">${html}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg ia';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">✦</div>
    <div class="msg-bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function enviar() {
  const input = document.getElementById('user-input');
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', texto);
  historial.push({ role: 'user', content: texto });
  if (historial.length > 12) historial = historial.slice(-12);

  document.getElementById('btn-send').disabled = true;
  addTyping();

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: TEXTOS[lang].system,
        messages: historial
      })
    });
    const data = await res.json();
    const respuesta = data.content[0].text;
    historial.push({ role: 'assistant', content: respuesta });

    removeTyping();
    addMsg('ia', respuesta);

    nConsultas++;
    costeSesion += 0.008;
    document.getElementById('n-consultas').textContent = nConsultas;
    document.getElementById('coste-sesion').textContent = costeSesion.toFixed(3) + ' €';

  } catch(e) {
    removeTyping();
    addMsg('ia', lang === 'es' ? 'Error al conectar. Inténtalo de nuevo.' : 'Error de connexió. Torna-ho a intentar.');
  }

  document.getElementById('btn-send').disabled = false;
}

function preguntaRapida(texto) {
  document.getElementById('user-input').value = texto;
  enviar();
}

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

renderChips();
setTimeout(() => addMsg('ia', TEXTOS[lang].bienvenida), 500);
</script>
</body>
</html>
