
<style>
  .root { padding: 1rem 0; font-family: var(--font-sans); }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tab { padding: 8px 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; font-size: 14px; font-weight: 500; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .name-row { display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center; }
  .name-row label { font-size: 14px; color: var(--color-text-secondary); white-space: nowrap; }
  .name-row input { flex: 1; font-size: 15px; }
  .msg-block { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .msg-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
  .msg-note { font-size: 12px; color: var(--color-text-tertiary); }
  .msg-text { font-size: 14px; color: var(--color-text-primary); line-height: 1.6; white-space: pre-wrap; border-left: 3px solid var(--color-border-secondary); padding-left: 12px; margin: 8px 0 10px; }
  .copy-btn { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); }
  .copy-btn.copied { color: #0f6e56; border-color: #0f6e56; }
  .url-block { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; color: var(--color-text-secondary); margin-top: 8px; word-break: break-all; }
  .gold-rule { background: #faeeda; border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; color: #633806; margin-top: 1.5rem; }
</style>
<div class="root">
  <h2 style="font-size:18px;font-weight:500;margin:0 0 1.5rem;color:var(--color-text-primary)">Plantilla de captación WhatsApp</h2>

  <div class="tabs">
    <div class="tab active" onclick="setTab('construccion',this)">Construcción</div>
    <div class="tab" onclick="setTab('seguridad',this)">Seguridad</div>
  </div>

  <div class="name-row">
    <label>Nombre del destinatario:</label>
    <input type="text" id="nombre" placeholder="Carlos, Paco, Marta..." oninput="render()" value="" />
  </div>

  <div id="mensajes"></div>

  <div class="gold-rule" id="regla"></div>
</div>

<script>
const DATA = {
  construccion: {
    regla: "Regla de oro: solo UN seguimiento. Si no contesta en 24h, no insistas.",
    msgs: [
      {
        label: "Mensaje 1 — Presentación",
        note: "Enviar primero",
        text: (n) => `Hola ${n} 👋 Soy Juan Manuel, de JM Prestige AI Solutions. Desarrollo apps digitales para empresas de construcción. Te mando algo que igual te interesa 😊`,
        extra: null
      },
      {
        label: "A continuación",
        note: "Sin texto adicional",
        text: () => `📹 ENVÍAS EL VÍDEO DIRECTAMENTE\n\nSin texto adicional. Dejas que hable solo.`,
        extra: null,
        highlight: true
      },
      {
        label: "Mensaje 2 — Si responde positivamente",
        note: "Solo si responde",
        text: (n) => `Me alegra que te guste 😊 Te he preparado una demo en 2 minutos con todo lo que haría por tu empresa 👇`,
        extra: (n) => `https://obracontrol-tech.github.io/jmprestige/presentacion-construccion.html?nombre=${encodeURIComponent(n||'[NOMBRE]')}\n\nSin compromiso, solo para que lo veas 😊`
      },
      {
        label: "Mensaje 3 — Seguimiento (si no contesta en 24h)",
        note: "Una sola vez",
        text: (n) => `Hola ${n||'[NOMBRE]'}, ¿pudiste ver el vídeo? 😊 Sin ningún compromiso, solo quería enseñarte lo que hacemos para empresas como la tuya. Cualquier duda me dices 👋`
      }
    ]
  },
  seguridad: {
    regla: "Regla de oro: solo UN seguimiento. Si no contesta en 24h, no insistas.",
    msgs: [
      {
        label: "Mensaje 1 — Presentación",
        note: "Enviar primero",
        text: (n) => `Hola ${n} 👋 Soy Juan Manuel, de JM Prestige AI Solutions. Desarrollo apps digitales para empresas de seguridad privada. Te mando algo que igual te interesa 😊`
      },
      {
        label: "A continuación",
        note: "Sin texto adicional",
        text: () => `📹 ENVÍAS EL VÍDEO DIRECTAMENTE\n\nSin texto adicional. Dejas que hable solo.`,
        highlight: true
      },
      {
        label: "Mensaje 2 — Si responde positivamente",
        note: "Solo si responde",
        text: (n) => `Me alegra que te guste 😊 Te he preparado una demo en 2 minutos con todo lo que haría por tu empresa 👇`,
        extra: (n) => `https://obracontrol-tech.github.io/jmprestige/presentacion-seguridad.html?nombre=${encodeURIComponent(n||'[NOMBRE]')}\n\nSin compromiso, solo para que lo veas 😊`
      },
      {
        label: "Mensaje 3 — Seguimiento (si no contesta en 24h)",
        note: "Una sola vez",
        text: (n) => `Hola ${n||'[NOMBRE]'}, ¿pudiste ver el vídeo? 😊 Sin ningún compromiso, solo quería enseñarte lo que hacemos para empresas como la tuya. Cualquier duda me dices 👋`
      }
    ]
  }
};

let currentTab = 'construccion';

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const nombre = document.getElementById('nombre').value.trim() || '[NOMBRE]';
  const data = DATA[currentTab];
  const container = document.getElementById('mensajes');
  
  container.innerHTML = data.msgs.map((m, i) => {
    const txt = m.text(nombre);
    const extraTxt = m.extra ? m.extra(nombre) : null;
    const fullText = extraTxt ? txt + '\n' + extraTxt : txt;
    const isInfo = m.highlight;
    return `
    <div class="msg-block" style="${isInfo ? 'background:var(--color-background-secondary);' : ''}">
      <div class="msg-header">
        <span class="msg-label">${m.label}</span>
        <span class="msg-note">${m.note || ''}</span>
      </div>
      <div class="msg-text" style="${isInfo ? 'border-color:#888;color:var(--color-text-secondary);' : ''}">${isInfo ? txt : (txt + (extraTxt ? '' : ''))}</div>
      ${extraTxt && !isInfo ? `<div class="url-block">${extraTxt}</div>` : ''}
      ${!isInfo ? `<button class="copy-btn" id="btn${i}" onclick="copyMsg(${i}, '${encodeURIComponent(fullText)}')">Copiar</button>` : ''}
    </div>`;
  }).join('');

  document.getElementById('regla').textContent = data.regla;
}

function copyMsg(i, encoded) {
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn' + i);
    btn.textContent = 'Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

render();
</script>
