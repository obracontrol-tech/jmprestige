<!DOCTYPE html>

<meta charset="UTF-8">

<title>JM Prestige - Header Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.header-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: #0d1b2a;
  border-radius: 14px;
  width: 100%;
  max-width: 800px;
  height: 160px;
}
.skyline-bg {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100%;
  opacity: 0.07;
}
.bg-glow {
  position: absolute;
  width: 260px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: pulse-glow 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes pulse-glow {
  0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
}
.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(245,166,35,0.3) 50%, transparent 100%);
  animation: scan 5s linear infinite;
  pointer-events: none;
}
@keyframes scan {
  0% { top: 0%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}
.corner { position: absolute; width: 16px; height: 16px; border-color: rgba(245,166,35,0.35); border-style: solid; }
.c-tl { top: 10px; left: 10px; border-width: 1.5px 0 0 1.5px; }
.c-tr { top: 10px; right: 10px; border-width: 1.5px 1.5px 0 0; }
.c-bl { bottom: 10px; left: 10px; border-width: 0 0 1.5px 1.5px; }
.c-br { bottom: 10px; right: 10px; border-width: 0 1.5px 1.5px 0; }
.content {
  position: relative;
  display: flex;
  align-items: center;
  gap: 1.1rem;
  z-index: 2;
}
.pin-wrap {
  animation: float 4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.pin-svg {
  width: 54px; height: 54px;
  filter: drop-shadow(0 0 10px rgba(255,165,0,0.55));
  animation: pin-shine 2.5s ease-in-out infinite;
}
@keyframes pin-shine {
  0%,100% { filter: drop-shadow(0 0 8px rgba(255,165,0,0.45)); }
  50% { filter: drop-shadow(0 0 20px rgba(255,200,50,0.85)); }
}
.text-block { display: flex; flex-direction: column; gap: 2px; }
.logo-text-main {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 1.85rem;
  letter-spacing: 0.05em;
  color: #ffffff;
  line-height: 1;
}
.logo-text-main span { color: #f5a623; }
.logo-sub {
  font-family: 'Exo 2', sans-serif;
  font-weight: 300;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}
.tagline {
  font-family: 'Exo 2', sans-serif;
  font-weight: 300;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: rgba(245,166,35,0.65);
  text-transform: uppercase;
  margin-top: 4px;
  padding-top: 4px;
  border-top: 0.5px solid rgba(245,166,35,0.2);
}
</style>
</head>
